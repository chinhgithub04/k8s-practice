apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/chinhgithub04/k8s-practice
    path: app-api
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: practice
  syncPolicy:
    automated:
      prune: true
      selfHeal: true